<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width", initial-scale="1.0" />
        <title>Signature Generator Pro</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Allura&family=Bad+Script&family=Bilbo+Swash+Caps&family=Caveat&family=Clicker+Script&family=Covered+By+Your+Grace&family=Dancing+Script&family=Gochi+Hand&family=Great+Vibes&family=Handlee&family=Just+Another+Hand&family=League+Script&family=Marck+Script&family=Meddon&family=Monsieur+La+Doulaise&family=Mr+De+Haviland&family=Mrs+Saint+Delafield&family=Parisienne&family=Pinyon+Script&family=Quintessential&family=Reenie+Beanie&family=Sacramento&family=Seaweed+Script&family=Yellowtail&display=swap"
            rel="stylesheet" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>    
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <style>

        </style>
    </head>
    <body>
        <nav class="app-nav" >
            <div class="nav-logo">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                    <path
                        d="M3 18C7 14 9 8 11 4"
                        stroke="currentColor"
                        stroke-width="2.2"
                        stroke-linecap="round" />
                    <path 
                        d="M11 4C13 8 16 13 19 15"
                        stroke="currentColor"
                        stroke-width="2.2"
                        stroke-linecap="round" />
                    <path 
                        d="M2 20h20"
                        stroke="currentColor"
                        stroke-width="2.2"
                        stroke-linecap="round" />
                </svg>
                <span>Signature Generator Pro</span>
            </div>
            <div class="nav-tabs">
                <button
                    class="nav-tab active"
                    id="tabGenerate"
                    onclick="switchTab('generate')">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path
                            d="M2 11C4 8 5.5 5 7 2M7 2C8.5 5 10 8 12 11M2 13H12"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round" />
                    </svg>
                    Generate Signature
                </button>
                <button class="nav-tab" id="tabPdf" onclick="swicthTab('pdf')">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <rect 
                          x="2"
                          y="1"
                          width="8"
                          height="12"
                          rx="1.5"
                          stroke="currentColor"
                          stroke-width="1.5" />
                        <path 
                          d="M10 1H11.5C11.776 1 12 1.224 12 1.5V12.5C12 12.776 11.776 13 11.5 13H10" 
                         
                          stroke="currentColor"
                          stroke-width="1.5" />
                        <path 
                          d="M4 5H8M4 7.5H8M4 10H6"
                          stroke="currentColor"
                          stroke-width="1.3"
                          stroke-linecap="round" /> 
                    </svg>
                    Sign a PDF
                </button>
            </div>
        </nav>

        <div id="pageGenerate" class="page active">
            <div class="page-inner">
                <div class="page-header">
                    <h1>Type your signature</h1>
                    <p>
                        Choose from various high-quality classic typography alternatives
                    </p>
                </div>

                <div class="controls-wrapper">
                    <div class="input-container">
                        <input
                            type="text"
                            id="signatureInput"
                            class="signature-input"
                            value="Type Here"
                            autocomplete="off"
                            maxlength="60" />
                    </div>
                    <div class="toolbar">
                        <div class="color-picker-wrapper" id="colorPickerBtn">
                            <span class="color-preview" id="colorPreview"></span>
                            <span class="color-hex" id="colorHex">#000000</span>
                            <input
                                type="color"
                                id="signatureColor"
                                class="color-picker"
                                value="#000000" />
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
